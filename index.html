<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitBounty — The fitness app with consequences.</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">FITBOUNTY</div>
  <a class="cta">GET EARLY ACCESS</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-glow"></div>

  <h1 class="hero-title">
    THE APP THAT MAKES YOU<br>
    <span class="highlight">ACCOUNTABLE.</span>
  </h1>

  <p class="hero-sub">
    Compete. Stay consistent. Win rewards.
  </p>

  <div class="hero-form">
    <input placeholder="Enter email">
    <button class="hero-btn">JOIN WAITLIST</button>
  </div>

  <div class="stats">
    <div><h2 class="counter">340</h2><p>Users</p></div>
    <div><h2 class="counter">4.8</h2><p>% Loss</p></div>
    <div><h2 class="counter">83</h2><p>% Retention</p></div>
  </div>
</section>

<!-- HOW -->
<section class="how fu">
  <h2>How it works</h2>

  <div class="steps">
    <div class="step">Create challenge</div>
    <div class="step">Track progress</div>
    <div class="step">Win rewards</div>
  </div>
</section>

<!-- LEADERBOARD -->
<section class="leaderboard fu">
  <h2>Live Leaderboard</h2>

  <div class="card">
    <div>#1 Pranith -4.2%</div>
    <div>#2 Shreyas -3.8%</div>
    <div>#3 Kishen -3.1%</div>
  </div>
</section>

<script src="script.js"></script>

</body>
</html>
