<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FITBOUNTY // PROTOCOL v2.0</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<style>
/* ─── AGGRESSIVE FUTURISTIC THEME ─── */
:root {
  --bg: #030305;
  --panel: #0a0a12;
  --gold: #ffaa00;
  --neon-red: #ff003c;
  --neon-blue: #00f2ff;
  --lime: #00ff88;
  --text: #ffffff;
  --t2: #a0a0c0;
  --fh: 'Bebas Neue', sans-serif;
  --fm: 'JetBrains Mono', monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
  line-height: 1.5;
}

/* ─── 3D CANVAS BACKGROUND ─── */
#canvas-container {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  pointer-events: none;
}

/* ─── NAVIGATION ─── */
nav {
  position: fixed;
  top: 0; width: 100%; z-index: 1000; height: 70px;
  background: rgba(3, 3, 5, 0.9);
  backdrop-filter: blur(15px);
  border-bottom: 2px solid var(--gold);
  display: flex;
  align-items: center;
  padding: 0 50px;
  clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%); /* Aggressive edge */
}

.nav-brand {
  font-family: var(--fh);
  font-size: 2.2rem;
  letter-spacing: 5px;
  color: var(--gold);
  text-shadow: 0 0 15px rgba(255, 170, 0, 0.4);
}

/* ─── HERO SECTION ─── */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.glitch-title {
  font-family: var(--fh);
  font-size: clamp(4rem, 15vw, 10rem);
  line-height: 0.85;
  text-transform: uppercase;
  font-weight: 900;
  font-style: italic;
  transform: skewX(-10deg); /* Aggressive tilt */
}

/* ─── 3D MECHANICAL CARD ─── */
.section-container {
  padding: 100px 5vw;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.mech-3d-card {
  background: var(--panel);
  border: 2px solid var(--gold);
  padding: 40px;
  max-width: 900px;
  width: 100%;
  position: relative;
  transform: perspective(1000px) rotateX(10deg);
  box-shadow: -20px 20px 0px var(--neon-red);
  transition: transform 0.1s ease-out;
}

#tmap {
  height: 400px;
  width: 100%;
  margin-top: 20px;
  filter: invert(100%) hue-rotate(180deg) brightness(0.6); /* Futuristic map style */
  border: 1px solid var(--gold);
}

/* ─── ROI CALCULATOR (B2B) ─── */
.roi-box {
  background: #111;
  padding: 40px;
  border-left: 5px solid var(--neon-blue);
  width: 100%;
  max-width: 600px;
  margin-top: 40px;
}

input {
  background: #222;
  border: 1px solid #444;
  color: #fff;
  padding: 12px;
  font-family: var(--fm);
  width: 100%;
  margin-bottom: 15px;
}

/* ─── BUTTONS ─── */
.cta-btn {
  background: var(--gold);
  color: #000;
  font-family: var(--fh);
  padding: 15px 45px;
  font-size: 1.6rem;
  border: none;
  cursor: pointer;
  clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
  transition: 0.3s;
}

.cta-btn:hover {
  background: #fff;
  transform: scale(1.1) skewX(-5deg);
  box-shadow: 0 0 30px var(--gold);
}
</style>
</head>
<body>

<div id="canvas-container"></div>

<nav>
  <div class="nav-brand">FITBOUNTY // PROTOCOL</div>
</nav>

<section class="hero">
  <div class="glitch-title">FITBOUNTY</div>
  <p style="font-family: var(--fm); color: var(--gold); letter-spacing: 2px;">[ STATUS: CONSEQUENCE BIOMETRICS ACTIVE ]</p>
  <button class="cta-btn">INITIALIZE PROTOCOL</button>
</section>

<section class="section-container" id="how">
  <h2 class="glitch-title" style="font-size: 4rem;">LIVE TERRITORY</h2>
  <div class="mech-3d-card" id="card3D">
    <p style="font-family: var(--fm); margin-bottom: 15px;">BOUNTIES COLLECTED: <span style="color:var(--neon-red)">$41,209.00</span></p>
    <div id="tmap"></div>
    <div id="runner-list" style="margin-top: 20px; font-family: var(--fm); font-size: 0.8rem;"></div>
  </div>
</section>

<section class="section-container" style="background: rgba(0, 242, 255, 0.03);">
  <h2 class="glitch-title" style="font-size: 4rem; color: var(--neon-blue);">ROI PROTOCOL</h2>
  <div class="roi-box">
    <label style="font-family: var(--fm); font-size: 0.7rem; color: var(--t2);">TOTAL EMPLOYEES</label>
    <input type="number" id="empCount" value="100" oninput="calcROI()">
    <label style="font-family: var(--fm); font-size: 0.7rem; color: var(--t2);">ANNUAL SICK DAYS</label>
    <input type="number" id="sickDays" value="5" oninput="calcROI()">
    <h3 style="margin-top: 20px; font-family: var(--fh); font-size: 2.5rem;">SAVINGS: <span id="roiResult" style="color: var(--lime);">$24,500</span></h3>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* 1. THREE.JS 3D BACKGROUND GRID */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('canvas-container').appendChild(renderer.domElement);

const grid = new THREE.GridHelper(100, 50, 0xffaa00, 0x222222);
grid.rotation.x = Math.PI / 2;
scene.add(grid);
camera.position.z = 20;

function animate() {
  requestAnimationFrame(animate);
  grid.position.z += 0.05; // Moving forward effect
  if (grid.position.z > 2) grid.position.z = 0;
  renderer.render(scene, camera);
}
animate();

/* 2. MAP & RUNNER LOGIC */
const map = L.map('tmap', {zoomControl: false}).setView([51.505, -0.09], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const runners = [
  { name: "Unit_07", color: "#ff003c", pos: [51.505, -0.09] },
  { name: "Shadow_X", color: "#00f2ff", pos: [51.51, -0.1] }
];

runners.forEach(r => {
  L.circleMarker(r.pos, { color: r.color, radius: 8 }).addTo(map);
  document.getElementById('runner-list').innerHTML += `<p style="color:${r.color}">[ SIGNAL ] ${r.name}: ACTIVE</p>`;
});

/* 3. ROI CALCULATOR LOGIC */
function calcROI() {
  const count = document.getElementById('empCount').value;
  const days = document.getElementById('sickDays').value;
  const total = count * days * 49;
  document.getElementById('roiResult').innerText = "$" + total.toLocaleString();
}

/* 4. 3D CARD MOUSE INTERACTION */
const card = document.getElementById('card3D');
document.addEventListener('mousemove', (e) => {
  let xAxis = (window.innerWidth / 2 - e.pageX) / 35;
  let yAxis = (window.innerHeight / 2 - e.pageY) / 35;
  card.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});
</script>
</body>
</html>
